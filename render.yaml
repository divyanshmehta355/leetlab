services:
  # The main Web Service (Backend API + statically served React Frontend)
  - type: web
    name: leetlab-web
    env: node
    region: ohio
    plan: starter
    # Build command installs frontend, builds it, then installs backend
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && npm install"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: leetlab-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: leetlab-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JDOODLE_CLIENT_ID
        sync: false # Set this manually in Render Dashboard
      - key: JDOODLE_CLIENT_SECRET
        sync: false # Set this manually in Render Dashboard

  # The Background Worker (BullMQ consumer)
  - type: worker
    name: leetlab-worker
    env: node
    region: ohio
    plan: starter
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && npm run worker"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: leetlab-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: leetlab-redis
          property: connectionString
      - key: JDOODLE_CLIENT_ID
        sync: false # Set this manually in Render Dashboard
      - key: JDOODLE_CLIENT_SECRET
        sync: false # Set this manually in Render Dashboard

databases:
  # Managed PostgreSQL Database
  - name: leetlab-db
    region: ohio
    plan: starter
    databaseName: leetlab
    user: leetlab

  # Managed Redis Instance
  - type: redis
    name: leetlab-redis
    region: ohio
    plan: starter
    ipAllowList: [] # Allows internal connections within Render
